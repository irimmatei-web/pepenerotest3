<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepenero | Meniu complet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #fff9f2; color: #2c2418; }
    h1, h2, h3, .logo { font-family: 'Playfair Display', serif; }
    
    header { position: sticky; top: 0; z-index: 1000; background: rgba(255, 251, 245, 0.97); backdrop-filter: blur(12px); box-shadow: 0 2px 20px rgba(0,0,0,0.05); border-bottom: 1px solid #f0e2d4; }
    .nav-container { max-width: 1400px; margin: 0 auto; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .logo h2 { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg, #c25b1e, #a04010); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav-links { display: flex; gap: 28px; list-style: none; flex-wrap: wrap; align-items: center; }
    .nav-links a { text-decoration: none; font-weight: 500; color: #3a2c1f; transition: 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #c25b1e; }
    .cart-icon { position: relative; cursor: pointer; font-size: 1.4rem; }
    .cart-count { position: absolute; top: -10px; right: -12px; background: #c25b1e; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    
    .container { max-width: 1300px; margin: 0 auto; padding: 0 40px; }
    .section-title { font-size: 2.2rem; text-align: center; margin: 40px 0; position: relative; }
    .section-title:after { content: ''; display: block; width: 70px; height: 3px; background: #c25b1e; margin: 12px auto; }
    
    .category { margin-bottom: 60px; background: white; border-radius: 32px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .category:nth-child(even) { background: #fffbf5; }
    .category h2 { font-size: 1.8rem; margin-bottom: 25px; color: #c25b1e; border-left: 5px solid #c25b1e; padding-left: 20px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .product-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
    .product-img { width: 100%; height: 180px; object-fit: cover; }
    .product-info { padding: 18px; }
    .product-info h3 { font-size: 1.2rem; margin-bottom: 8px; }
    .product-info p { color: #6b5a4a; font-size: 0.85rem; margin-bottom: 10px; }
    .product-price { font-size: 1.3rem; font-weight: 800; color: #c25b1e; }
    
    footer { background: #1e1812; color: #e1cfbc; padding: 40px 0; text-align: center; margin-top: 40px; }
    @media (max-width: 768px) { .container { padding: 0 20px; } .nav-container { flex-direction: column; } }
  </style>
</head>
<body>

<header>
  <div class="nav-container">
    <div class="logo"><h2>🍕 Pepenero</h2></div>
    <ul class="nav-links">
      <li><a href="index.html">Acasă</a></li>
      <li><a href="meniu.html" class="active">Meniu</a></li>
      <li><a href="galerie.html">Galerie</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li class="cart-icon" id="cartIcon"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></li>
    </ul>
  </div>
</header>

<main>
  <div class="container">
    <div class="section-title">🍕 Meniul nostru</div>
    <div id="menuContainer"></div>
  </div>
</main>

<footer><div class="container"><p>© 2025 Pepenero - Pizzerie Napoletană Autentică</p></div></footer>

<script>
  let cart = JSON.parse(localStorage.getItem('pepenero_cart')) || [];
  function updateCartUI() { document.getElementById('cartCount').innerText = cart.reduce((a,b)=> a + b.quantity, 0); }
  updateCartUI();
  document.getElementById('cartIcon').onclick = () => window.location.href = 'cos.html';

  const products = [
    { id: 1, name: "Margherita", price: 32, gram: "330g", category: "pizza", img: "https://images.pexels.com/photos/2147491/pexels-photo-2147491.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Sos San Marzano, mozzarella DOP, busuioc" },
    { id: 2, name: "Diavola", price: 38, gram: "350g", category: "pizza", img: "https://images.pexels.com/photos/2619967/pexels-photo-2619967.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Salam picant, ardei iute, parmezan" },
    { id: 3, name: "Quattro Formaggi", price: 42, gram: "360g", category: "pizza", img: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Gorgonzola, parmezan, mozzarella" },
    { id: 4, name: "Prosciutto e Funghi", price: 40, gram: "340g", category: "pizza", img: "https://images.pexels.com/photos/1653877/pexels-photo-1653877.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Prosciutto cotto, ciuperci" },
    { id: 5, name: "Capricciosa", price: 44, gram: "370g", category: "pizza", img: "https://images.pexels.com/photos/905847/pexels-photo-905847.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Șuncă, ciuperci, anghinare" },
    { id: 6, name: "Vegetariana", price: 36, gram: "350g", category: "pizza", img: "https://images.pexels.com/photos/3020919/pexels-photo-3020919.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Dovlecel, vinete, ardei, rucola" },
    { id: 7, name: "Frutti di Mare", price: 52, gram: "380g", category: "pizza", img: "https://images.pexels.com/photos/5946646/pexels-photo-5946646.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Calamari, creveți, midii" },
    { id: 8, name: "Carbonara Pizza", price: 45, gram: "360g", category: "pizza", img: "https://images.pexels.com/photos/2147491/pexels-photo-2147491.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Guanciale, ou, pecorino" },
    { id: 9, name: "Spaghetti Carbonara", price: 44, gram: "300g", category: "pasta", img: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Guanciale, ou, pecorino" },
    { id: 10, name: "Tagliatelle al Ragù", price: 46, gram: "320g", category: "pasta", img: "https://images.pexels.com/photos/905847/pexels-photo-905847.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Sos de vită gătit 12 ore" },
    { id: 11, name: "Burger Classic", price: 38, gram: "280g", category: "burger", img: "https://images.pexels.com/photos/2619967/pexels-photo-2619967.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Carne vită, cheddar, salată" },
    { id: 12, name: "Burger Trufă", price: 48, gram: "300g", category: "burger", img: "https://images.pexels.com/photos/1653877/pexels-photo-1653877.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Sos trufă, parmezan, rucola" },
    { id: 13, name: "Salată Caesar", price: 32, gram: "250g", category: "salad", img: "https://images.pexels.com/photos/3020919/pexels-photo-3020919.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Pui, parmezan, crutoane" },
    { id: 14, name: "Tiramisu", price: 26, gram: "150g", category: "desert", img: "https://images.pexels.com/photos/5946646/pexels-photo-5946646.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Mascarpone, cafea, cacao" },
    { id: 15, name: "Panna Cotta", price: 24, gram: "140g", category: "desert", img: "https://images.pexels.com/photos/905847/pexels-photo-905847.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Sos fructe de pădure" },
    { id: 16, name: "Aperol Spritz", price: 30, gram: "250ml", category: "drink", img: "https://images.pexels.com/photos/2619967/pexels-photo-2619967.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Aperol, Prosecco, portocală" },
    { id: 17, name: "Limonadă", price: 16, gram: "350ml", category: "drink", img: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Lămâie, mentă, ghimbir" },
    { id: 18, name: "Pizza Bambino", price: 22, gram: "200g", category: "kids", img: "https://images.pexels.com/photos/2147491/pexels-photo-2147491.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Pizza mică + suc" },
    { id: 19, name: "Paste Bambino", price: 20, gram: "200g", category: "kids", img: "https://images.pexels.com/photos/905847/pexels-photo-905847.jpeg?auto=compress&cs=tinysrgb&w=300", desc: "Paste cu sos roșu + suc" }
  ];

  const categories = [
    { id: "pizza", name: "🍕 Pizza Napoletană", icon: "fa-pizza-slice", bg: "#fff" },
    { id: "pasta", name: "🍝 Paste & Risotto", icon: "fa-utensils", bg: "#fffbf5" },
    { id: "burger", name: "🍔 Burgeri Premium", icon: "fa-burger", bg: "#fff" },
    { id: "salad", name: "🥗 Salate Proaspete", icon: "fa-leaf", bg: "#fffbf5" },
    { id: "desert", name: "🍰 Dolci Italiane", icon: "fa-cake-candles", bg: "#fff" },
    { id: "drink", name: "🍹 Băuturi", icon: "fa-wine-glass", bg: "#fffbf5" },
    { id: "kids", name: "👶 Meniu Copii", icon: "fa-child", bg: "#fff" }
  ];

  const container = document.getElementById('menuContainer');
  container.innerHTML = categories.map(cat => `
    <div class="category" style="background:${cat.bg}">
      <h2><i class="fas ${cat.icon}"></i> ${cat.name}</h2>
      <div class="menu-grid">
        ${products.filter(p => p.category === cat.id).map(p => `
          <div class="product-card" onclick="location.href='produs.html?id=${p.id}'">
            <img class="product-img" src="${p.img}" alt="${p.name}">
            <div class="product-info">
              <h3>${p.name}</h3>
              <p>${p.desc}</p>
              <div class="product-price">${p.price} lei | ${p.gram}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
